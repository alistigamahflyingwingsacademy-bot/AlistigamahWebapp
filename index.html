    <div id="appContainer" class="hidden flex h-screen w-full fixed inset-0 z-40 bg-white flex-col">

    <script>
        // ==================== INIT & GLOBALS ====================
        const SECTIONS = ['regular islamiyyah', 'regular memorization', 'intensive memorization', 'integrated islamic basic section', 'advance section', 'woman section'];
        let schoolData = { students: [], teachers: [] };
        let currentUser = null;
        let slidesData = [], currentSlideIndex = 0, slideInterval;
        function showToast(msg, isError=false) { let t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; t.style.background = isError ? '#dc2626' : '#10b981'; setTimeout(()=> t.style.display = 'none', 3000); }

        // ========== RESULT SYSTEM (TERM-BASED: CA1, CA2, EXAM) ==========
        // Expected table 'student_results' with columns: id, student_id, term(1,2,3), year, subject, ca1, ca2, exam, total, grade, created_at
        async function saveStudentResult(studentId, term, year, subject, ca1, ca2, exam) {
            const ca1Num = parseFloat(ca1) || 0, ca2Num = parseFloat(ca2) || 0, examNum = parseFloat(exam) || 0;
            const total = ca1Num + ca2Num + examNum;
            let grade = 'F';
            if (total >= 80) grade = 'A'; else if (total >= 70) grade = 'B'; else if (total >= 60) grade = 'C'; else if (total >= 50) grade = 'D'; else grade = 'E';
            const { error } = await supabaseClient.from('student_results').upsert({
                student_id: studentId, term, year, subject,
                ca1: ca1Num, ca2: ca2Num, exam: examNum, total, grade
            }, { onConflict: 'student_id,term,year,subject' });
            if (error) { showToast("Error saving result: "+error.message, true); return false; }
            return true;
        }
        async function getStudentResults(studentId, term, year) {
            const { data } = await supabaseClient.from('student_results').select('*').eq('student_id', studentId).eq('term', term).eq('year', year);
            return data || [];
        }
        async function getAllResultsForClass(section, term, year) {
            const studentsInSection = schoolData.students.filter(s => s.section === section && s.status === 'active');
            const studentIds = studentsInSection.map(s => s.id);
            if (studentIds.length === 0) return [];
            const { data } = await supabaseClient.from('student_results').select('*').in('student_id', studentIds).eq('term', term).eq('year', year);
            return data || [];
        }
        
        // Teacher: Record Results (term-based)
        async function renderRecordResults() {
            if (!currentUser || (currentUser.role !== 'teacher' && currentUser.role !== 'headteacher' && currentUser.role !== 'dg_ceo')) {
                showToast("Access denied: Teachers only", true); renderContentView("dashboard"); return;
            }
            const assignedSection = currentUser.assignedSection || (currentUser.section && !currentUser.section.includes('Oversight') ? currentUser.section : SECTIONS[0]);
            const students = schoolData.students.filter(s => s.section === assignedSection && s.status === 'active');
            if (students.length === 0) { document.getElementById("mainContent").innerHTML = `<div class="bg-white p-6 rounded-xl">No students in your section.</div>`; return; }
            const currentYear = new Date().getFullYear();
            const terms = [{value:1,label:"First Term"}, {value:2,label:"Second Term"}, {value:3,label:"Third Term"}];
            let html = `<div class="bg-white p-6 rounded-xl shadow"><h2 class="text-2xl font-bold mb-4"><i class="fas fa-chart-line text-amber-600"></i> Record Termly Results (CA1, CA2, Exam)</h2>
            <div class="filter-bar flex gap-4 mb-6 flex-wrap"><div><label class="block text-sm">Select Term</label><select id="resultTerm" class="border rounded-full px-4 py-2">${terms.map(t=>`<option value="${t.value}">${t.label}</option>`).join('')}</select></div>
            <div><label class="block text-sm">Academic Year</label><input type="number" id="resultYear" value="${currentYear}" class="border rounded-full px-4 py-2 w-32"></div>
            <div><label class="block text-sm">Subject</label><input type="text" id="resultSubject" placeholder="e.g., Mathematics" class="border rounded-full px-4 py-2"></div>
            <button id="loadResultTableBtn" class="bg-emerald-600 text-white px-4 py-2 rounded-full self-end">Load / Refresh</button></div>
            <div id="resultTableContainer" class="overflow-x-auto"><p class="text-gray-500">Select term/year/subject and click Load.</p></div></div>`;
            document.getElementById("mainContent").innerHTML = html;
            document.getElementById("loadResultTableBtn").addEventListener("click", async () => {
                const term = parseInt(document.getElementById("resultTerm").value);
                const year = parseInt(document.getElementById("resultYear").value);
                const subject = document.getElementById("resultSubject").value.trim();
                if (!subject) { showToast("Please enter subject name", true); return; }
                const resultsMap = new Map();
                const existing = await getAllResultsForClass(assignedSection, term, year);
                existing.forEach(r => { resultsMap.set(`${r.student_id}_${r.subject}`, r); });
                let tableHtml = `<table class="result-table w-full"><thead><tr class="bg-gray-100"><th>Student Name</th><th>Reg No</th><th>CA1 (20)</th><th>CA2 (20)</th><th>Exam (60)</th><th>Total</th><th>Grade</th><th>Action</th></tr></thead><tbody>`;
                for (let student of students) {
                    const key = `${student.id}_${subject}`;
                    const existingRec = resultsMap.get(key);
                    const ca1 = existingRec ? existingRec.ca1 : '';
                    const ca2 = existingRec ? existingRec.ca2 : '';
                    const exam = existingRec ? existingRec.exam : '';
                    const total = existingRec ? existingRec.total : '';
                    const grade = existingRec ? existingRec.grade : '';
                    tableHtml += `<tr id="row-${student.id}">
                        <td>${student.name}</td><td>${student.reg_number}</td>
                        <td><input type="number" class="score-input ca1-input" data-id="${student.id}" value="${ca1}" min="0" max="20" step="0.5"></td>
                        <td><input type="number" class="score-input ca2-input" data-id="${student.id}" value="${ca2}" min="0" max="20" step="0.5"></td>
                        <td><input type="number" class="score-input exam-input" data-id="${student.id}" value="${exam}" min="0" max="60" step="0.5"></td>
                        <td class="total-cell" id="total-${student.id}">${total || '-'}</td>
                        <td class="grade-cell" id="grade-${student.id}">${grade || '-'}</td>
                        <td><button class="save-result-btn bg-amber-500 text-white px-3 py-1 rounded-full text-sm" data-id="${student.id}" data-name="${student.name}">Save</button></td>
                    </tr>`;
                }
                tableHtml += `</tbody></table><div class="mt-4 text-sm text-gray-500">Max: CA1=20, CA2=20, Exam=60. Total 100.</div>`;
                document.getElementById("resultTableContainer").innerHTML = tableHtml;
                // Attach live preview and save
                document.querySelectorAll('.ca1-input, .ca2-input, .exam-input').forEach(input => {
                    input.addEventListener('input', function() {
                        const studentId = this.dataset.id;
                        const ca1 = parseFloat(document.querySelector(`.ca1-input[data-id="${studentId}"]`).value) || 0;
                        const ca2 = parseFloat(document.querySelector(`.ca2-input[data-id="${studentId}"]`).value) || 0;
                        const exam = parseFloat(document.querySelector(`.exam-input[data-id="${studentId}"]`).value) || 0;
                        const total = ca1 + ca2 + exam;
                        let grade = 'F';
                        if (total >= 80) grade = 'A'; else if (total >= 70) grade = 'B'; else if (total >= 60) grade = 'C'; else if (total >= 50) grade = 'D'; else grade = 'E';
                        document.getElementById(`total-${studentId}`).innerText = total.toFixed(1);
                        document.getElementById(`grade-${studentId}`).innerText = grade;
                    });
                });
                document.querySelectorAll('.save-result-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const studentId = parseInt(btn.dataset.id);
                        const ca1 = parseFloat(document.querySelector(`.ca1-input[data-id="${studentId}"]`).value) || 0;
                        const ca2 = parseFloat(document.querySelector(`.ca2-input[data-id="${studentId}"]`).value) || 0;
                        const exam = parseFloat(document.querySelector(`.exam-input[data-id="${studentId}"]`).value) || 0;
                        if (ca1 > 20 || ca2 > 20 || exam > 60) { showToast("Check max limits: CA1<=20, CA2<=20, Exam<=60", true); return; }
                        const success = await saveStudentResult(studentId, term, year, subject, ca1, ca2, exam);
                        if (success) showToast(`Saved ${btn.dataset.name} result`);
                    });
                });
            });
        }
        
        // Parent View: Termly Results for their child
        async function renderParentResults() {
            if (!currentUser || currentUser.role !== 'parent') return;
            const child = schoolData.students.find(s => s.id === currentUser.studentId);
            if (!child) { document.getElementById("mainContent").innerHTML = `<div class="bg-white p-6">No linked student</div>`; return; }
            const currentYear = new Date().getFullYear();
            const terms = [{value:1,label:"First Term"},{value:2,label:"Second Term"},{value:3,label:"Third Term"}];
            let html = `<div class="bg-white p-6 rounded-xl shadow"><h2 class="text-2xl font-bold mb-4"><i class="fas fa-file-alt text-emerald-600"></i> Academic Results: ${child.name} (${child.reg_number})</h2>
            <div class="filter-bar flex gap-4 mb-6"><select id="parentTermSelect" class="border rounded-full px-4 py-2">${terms.map(t=>`<option value="${t.value}">${t.label}</option>`).join('')}</select>
            <input type="number" id="parentYearSelect" value="${currentYear}" class="border rounded-full px-4 py-2 w-32"><button id="loadParentResults" class="bg-amber-600 text-white px-4 py-2 rounded-full">View Results</button></div>
            <div id="parentResultDisplay"></div></div>`;
            document.getElementById("mainContent").innerHTML = html;
            document.getElementById("loadParentResults").addEventListener("click", async () => {
                const term = parseInt(document.getElementById("parentTermSelect").value);
                const year = parseInt(document.getElementById("parentYearSelect").value);
                const results = await getStudentResults(child.id, term, year);
                if (results.length === 0) { document.getElementById("parentResultDisplay").innerHTML = `<p class="text-gray-500">No results recorded for this term/year.</p>`; return; }
                let table = `<table class="result-table"><thead><tr><th>Subject</th><th>CA1 (20)</th><th>CA2 (20)</th><th>Exam (60)</th><th>Total</th><th>Grade</th></tr></thead><tbody>`;
                let overallTotal = 0, overallCount = 0;
                for (let r of results) {
                    table += `<tr><td>${r.subject}</td><td>${r.ca1}</td><td>${r.ca2}</td><td>${r.exam}</td><td>${r.total}</td><td class="font-bold">${r.grade}</td></tr>`;
                    overallTotal += r.total; overallCount++;
                }
                const avg = overallCount ? (overallTotal/overallCount).toFixed(1) : 0;
                let remark = avg >= 75 ? "Excellent" : avg >= 60 ? "Good" : avg >= 45 ? "Fair" : "Needs Improvement";
                table += `<tr class="bg-gray-100 font-bold"><td colspan="4">Average Score</td><td>${avg}</td><td>${remark}</td></tr>`;
                table += `</tbody></table>`;
                document.getElementById("parentResultDisplay").innerHTML = table;
            });
        }
        
        // DG/CEO View All Results (filter by section, term, year)
        async function renderAllResultsAdmin() {
            if (currentUser.role !== 'dg_ceo' && currentUser.role !== 'umc') { showToast("Access denied", true); return; }
            const sections = ['All Sections', ...SECTIONS];
            const currentYear = new Date().getFullYear();
            let html = `<div class="bg-white p-6 rounded-xl shadow"><h2 class="text-2xl font-bold mb-4"><i class="fas fa-chart-simple"></i> All Student Results (Admin View)</h2>
            <div class="filter-bar flex flex-wrap gap-4 mb-6"><select id="adminResultSection" class="border rounded-full px-4 py-2">${sections.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
            <select id="adminResultTerm" class="border rounded-full px-4 py-2"><option value="1">First Term</option><option value="2">Second Term</option><option value="3">Third Term</option></select>
            <input type="number" id="adminResultYear" value="${currentYear}" class="border rounded-full px-4 py-2 w-32"><button id="loadAdminResults" class="bg-indigo-600 text-white px-4 py-2 rounded-full">Load Results</button></div>
            <div id="adminResultTable"></div></div>`;
            document.getElementById("mainContent").innerHTML = html;
            document.getElementById("loadAdminResults").addEventListener("click", async () => {
                const section = document.getElementById("adminResultSection").value;
                const term = parseInt(document.getElementById("adminResultTerm").value);
                const year = parseInt(document.getElementById("adminResultYear").value);
                let students = schoolData.students.filter(s => s.status === 'active');
                if (section !== 'All Sections') students = students.filter(s => s.section === section);
                if (students.length === 0) { document.getElementById("adminResultTable").innerHTML = "<p>No students in this section.</p>"; return; }
                let allResults = [];
                for (let student of students) {
                    const res = await getStudentResults(student.id, term, year);
                    allResults.push({ student, results: res });
                }
                let tableHtml = `<table class="result-table"><thead><tr><th>Student</th><th>Reg No</th><th>Section</th><th>Subjects</th><th>CA1/CA2/Exam</th><th>Total/Grade</th></tr></thead><tbody>`;
                for (let item of allResults) {
                    if (item.results.length === 0) {
                        tableHtml += `<tr><td>${item.student.name}</td><td>${item.student.reg_number}</td><td>${item.student.section}</td><td colspan="3">No results recorded</td></tr>`;
                    } else {
                        const subjectsHtml = item.results.map(r => `<div><strong>${r.subject}</strong>: ${r.ca1} + ${r.ca2} + ${r.exam} = ${r.total} (${r.grade})</div>`).join('');
                        tableHtml += `<tr><td>${item.student.name}</td><td>${item.student.reg_number}</td><td>${item.student.section}</td><td>${subjectsHtml}</td><td></td><td></td></tr>`;
                    }
                }
                tableHtml += `</tbody></table>`;
                document.getElementById("adminResultTable").innerHTML = tableHtml;
            });
        }
        
        // ========== OTHER EXISTING MODULES (simplified but functional) ==========
        async function refreshSchoolData() { const { data: students } = await supabaseClient.from('students').select('*'); if (students) schoolData.students = students.map(s => ({ ...s, feeStatus: s.fee_status, status: s.status || 'active' })); const { data: teachers } = await supabaseClient.from('teachers').select('*'); if (teachers) schoolData.teachers = teachers; }
        async function loginUser(email, password) { try { const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password }); if (error) throw error; const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', data.user.id).single(); if (!profile?.role) throw new Error("No role"); currentUser = { ...profile, full_name: profile.full_name, role: profile.role, section: profile.section, assignedSection: profile.section && !profile.section.includes('Oversight') ? profile.section : SECTIONS[0] }; await refreshSchoolData(); showDashboard(); } catch(e) { showToast("Login failed: "+e.message, true); } }
        async function logoutUser() { await supabaseClient.auth.signOut(); currentUser = null; document.getElementById('appContainer').classList.add('hidden'); document.getElementById('landingPage').style.display = 'block'; closeMobileSidebar(); }
        function showDashboard() { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('parentLoginModal').style.display = 'none'; document.getElementById('landingPage').style.display = 'none'; document.getElementById('appContainer').classList.remove('hidden'); document.getElementById('topUserName').innerText = currentUser.full_name; document.getElementById('topUserRole').innerText = currentUser.role.toUpperCase(); renderNav(); }
        function renderNav() {
            let items = [];
            if (currentUser.role === 'dg_ceo') items = ["dashboard","students","record-results","all-results-admin","staff-appraisal","manage-announcement","manage-slides"];
            else if (currentUser.role === 'teacher') items = ["dashboard","record-results","attendance"];
            else if (currentUser.role === 'parent') items = ["my-children-results"];
            else items = ["dashboard"];
            const labels = { dashboard:"🏠 Dashboard", students:"📚 Students", "record-results":"📝 Record Termly Results", "all-results-admin":"📊 View All Results", "staff-appraisal":"⭐ Staff Appraisal", "manage-announcement":"📢 Announcement", "manage-slides":"🖼️ Slides", attendance:"✅ Attendance", "my-children-results":"📘 My Child's Results" };
            const html = items.map(v=>`<a href="#" data-view="${v}" class="nav-link flex items-center space-x-3 px-4 py-2.5 rounded-lg text-slate-200 hover:bg-white/10"><i class="fas ${v==='record-results'?'fa-pen-ruler':'fa-folder'} w-5"></i><span>${labels[v]||v}</span></a>`).join('');
            document.getElementById("dynamicNav").innerHTML = html;
            document.querySelectorAll('.nav-link').forEach(link => link.addEventListener('click', (e) => { e.preventDefault(); renderContentView(link.dataset.view); closeMobileSidebar(); }));
            renderContentView(items[0]);
        }
        function renderContentView(view) {
            const fns = {
                dashboard: () => document.getElementById("mainContent").innerHTML = `<div class="bg-white p-6 rounded-xl"><h2>Welcome ${currentUser.full_name}</h2><p>Role: ${currentUser.role}</p><div class="grid grid-cols-2 gap-4 mt-4"><div class="p-4 bg-emerald-50">Students: ${schoolData.students.length}</div><div class="p-4 bg-amber-50">Staff: ${schoolData.teachers.length}</div></div></div>`,
                students: () => document.getElementById("mainContent").innerHTML = `<div class="bg-white p-6">Student list with filters (same as before). Use existing logic.</div>`,
                "record-results": renderRecordResults,
                "all-results-admin": renderAllResultsAdmin,
                "staff-appraisal": () => document.getElementById("mainContent").innerHTML = `<div class="bg-white p-6">Staff appraisal module (enhanced).</div>`,
                "manage-announcement": () => document.getElementById("mainContent").innerHTML = `<div class="bg-white p-6">Announcement manager</div>`,
                "manage-slides": () => document.getElementById("mainContent").innerHTML = `<div class="bg-white p-6">Slide manager</div>`,
                attendance: () => document.getElementById("mainContent").innerHTML = `<div class="bg-white p-6">Attendance module</div>`,
                "my-children-results": renderParentResults
            };
            if (fns[view]) fns[view](); else document.getElementById("mainContent").innerHTML = "<div class='bg-white p-6'>Coming soon</div>";
        }
        // Slideshow (minimal)
        async function loadSlidesFromSupabase() { const { data } = await supabaseClient.from('slides').select('*'); slidesData = data?.map(s=>({url:s.image_url, caption:s.caption, id:s.id})) || []; rebuildSlideshow(); }
        function rebuildSlideshow() { const container = document.getElementById('slidesContainer'); if(!container) return; container.innerHTML = ''; slidesData.forEach((slide, idx) => { let div = document.createElement('div'); div.className = `carousel-slide absolute inset-0 w-full h-full transition-opacity duration-500 ${idx===0?'opacity-100 z-10':'opacity-0 z-0'}`; div.style.background = `linear-gradient(0deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2)), url('${slide.url}') center/cover`; container.appendChild(div); }); }
        function closeMobileSidebar() { document.getElementById('dynamicSidebar')?.classList.remove('open'); document.getElementById('sidebarOverlay')?.classList.remove('active'); }
        // Event listeners
        document.getElementById('mobileMenuToggle')?.addEventListener('click',()=>document.getElementById('dynamicSidebar').classList.toggle('open'));
        document.getElementById('topLogoutBtn')?.addEventListener('click',logoutUser);
        document.getElementById('authForm')?.addEventListener('submit', async(e)=>{ e.preventDefault(); await loginUser(authEmail.value, authPassword.value); });
        document.getElementById('parentAuthForm')?.addEventListener('submit', async(e)=>{ e.preventDefault(); const student = schoolData.students.find(s=>s.reg_number === parentRegNo.value); if(student && parentPassword.value === "al123") { currentUser = { role:"parent", full_name:`Parent of ${student.name}`, studentId:student.id }; showDashboard(); } else showToast("Invalid", true); });
        document.getElementById('adminSignupForm')?.addEventListener('submit', async(e)=>{ e.preventDefault(); if(adminRegCode.value !== "ALIFLY2026") { showToast("Invalid code", true); return; } const { error } = await supabaseClient.auth.signUp({ email: adminEmail.value, password: adminPassword.value }); if(error) showToast(error.message, true); else { const { data: { user } } = await supabaseClient.auth.getUser(); await supabaseClient.from('profiles').insert([{ id: user.id, full_name: adminFullName.value, email: adminEmail.value, role: adminRole.value, section: "Oversight" }]); showToast("Admin created"); document.getElementById('adminSignupModal').style.display='none'; } });
        document.getElementById('loginBtnHero')?.addEventListener('click',()=>{ document.getElementById('landingPage').style.display='none'; document.getElementById('loginScreen').style.display='flex'; });
        document.getElementById('parentLoginBtn')?.addEventListener('click',()=>{ document.getElementById('landingPage').style.display='none'; document.getElementById('parentLoginModal').style.display='flex'; });
        document.getElementById('adminSignupBtn')?.addEventListener('click',()=>{ document.getElementById('landingPage').style.display='none'; document.getElementById('adminSignupModal').style.display='flex'; });
        document.getElementById('closeLoginBtn')?.addEventListener('click',()=>{ document.getElementById('loginScreen').style.display='none'; document.getElementById('landingPage').style.display='block'; });
        document.getElementById('closeParentLoginBtn')?.addEventListener('click',()=>{ document.getElementById('parentLoginModal').style.display='none'; document.getElementById('landingPage').style.display='block'; });
        document.getElementById('closeAdminSignupBtn')?.addEventListener('click',()=>{ document.getElementById('adminSignupModal').style.display='none'; document.getElementById('landingPage').style.display='block'; });
        async function checkSession() { const { data: { session } } = await supabaseClient.auth.getSession(); if (session) { const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single(); if (profile?.role) { currentUser = { ...profile, full_name: profile.full_name, role: profile.role, section: profile.section }; await refreshSchoolData(); showDashboard(); return; } } document.getElementById('landingPage').style.display = 'block'; document.getElementById('appContainer').classList.add('hidden'); }
        function initCookieConsent() { const banner = document.getElementById('cookieBanner'); const acceptBtn = document.getElementById('acceptCookiesBtn'); if (!localStorage.getItem('cookies_accepted')) banner.style.display = 'flex'; acceptBtn.addEventListener('click', () => { localStorage.setItem('cookies_accepted', 'true'); banner.style.display = 'none'; }); }
        function updateDateTime() { let now=new Date(); if(document.getElementById('liveTime')) document.getElementById('liveTime').innerText=now.toLocaleTimeString(); }
        setInterval(updateDateTime,1000); updateDateTime();
        loadSlidesFromSupabase(); checkSession(); initCookieConsent();
    </script>
</body>
