<!-- Newsletter Section: Insert above slideshow + Dashboard Manager for DG -->
<style>
/* subtle fade-in / slide-down animation */
.newsletter-card {
    animation: slideDownFade 0.4s ease-out;
}
@keyframes slideDownFade {
    0% { opacity: 0; transform: translateY(-20px); }
    100% { opacity: 1; transform: translateY(0); }
}
.newsletter-edit-btn, .newsletter-delete-btn {
    transition: all 0.2s;
}
.newsletter-edit-btn:hover, .newsletter-delete-btn:hover {
    transform: scale(1.05);
}
</style>

<script>
(function() {
    // ---------- LANDING PAGE NEWSLETTER (above slideshow) ----------
    let latestNewsletter = null;
    let landingContainer = null;
    let newsletterSubscription = null;

    // fetch the most recent newsletter
    async function fetchLatestNewsletter() {
        try {
            const { data, error } = await supabaseClient
                .from('newsletters')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(1);
            if (error) throw error;
            latestNewsletter = data && data.length ? data[0] : null;
            renderLandingNewsletter();
        } catch (err) {
            console.warn("Newsletter fetch error:", err);
            latestNewsletter = null;
            renderLandingNewsletter();
        }
    }

    // format date nicely
    function formatDate(isoString) {
        if (!isoString) return '';
        const d = new Date(isoString);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // render the card on landing page
    function renderLandingNewsletter() {
        if (!landingContainer) return;
        if (!latestNewsletter) {
            landingContainer.style.display = 'none';
            return;
        }
        landingContainer.style.display = 'block';
        landingContainer.innerHTML = `
            <div class="newsletter-card bg-white rounded-2xl shadow-xl overflow-hidden border-l-8 border-amber-500 p-6 mb-8 transition-all hover:shadow-2xl">
                <div class="flex flex-wrap justify-between items-start gap-3">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 text-amber-600 text-sm mb-1">
                            <i class="fas fa-newspaper"></i> <span>📢 Latest Announcement</span>
                        </div>
                        <h3 class="text-2xl font-bold text-gray-800">${escapeHtml(latestNewsletter.title)}</h3>
                        <p class="text-gray-600 mt-2 leading-relaxed">${escapeHtml(latestNewsletter.content).replace(/\n/g, '<br>')}</p>
                        <div class="flex items-center gap-2 mt-4 text-xs text-gray-400">
                            <i class="far fa-calendar-alt"></i> ${formatDate(latestNewsletter.created_at)}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    // simple escape to prevent XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Insert newsletter container above slideshow
    function initLandingNewsletter() {
        const slideshowContainer = document.querySelector('.container.mx-auto.px-6.py-12');
        if (!slideshowContainer) return;
        // avoid duplicate insertion
        if (document.getElementById('newsletterLandingRoot')) return;
        const wrapper = document.createElement('div');
        wrapper.id = 'newsletterLandingRoot';
        wrapper.className = 'container mx-auto px-6 pt-8';
        slideshowContainer.parentNode.insertBefore(wrapper, slideshowContainer);
        landingContainer = document.createElement('div');
        landingContainer.id = 'newsletterLandingInner';
        wrapper.appendChild(landingContainer);
        fetchLatestNewsletter();

        // realtime subscription – instantly reflect changes on landing page
        if (newsletterSubscription) newsletterSubscription.unsubscribe();
        newsletterSubscription = supabaseClient
            .channel('newsletter-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'newsletters' }, () => {
                fetchLatestNewsletter();
            })
            .subscribe();
    }

    // ---------- DASHBOARD MANAGER FOR DG ROLE (dg_ceo) ----------
    let currentNewslettersList = [];
    let editingNewsletterId = null;

    async function loadAllNewslettersForManager() {
        try {
            const { data, error } = await supabaseClient
                .from('newsletters')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) throw error;
            currentNewslettersList = data || [];
            renderNewsletterManager();
        } catch (err) {
            showToast("Failed to load newsletters: " + err.message, true);
        }
    }

    function renderNewsletterManager() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        const addFormHtml = `
            <div class="bg-white p-6 rounded-xl shadow mb-6">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-amber-600"></i> ${editingNewsletterId ? 'Edit Newsletter' : 'Create Newsletter'}</h3>
                <div class="space-y-4">
                    <input type="text" id="newsletterTitle" placeholder="Title" class="w-full border rounded-lg p-2" value="${editingNewsletterId ? (currentNewslettersList.find(n => n.id === editingNewsletterId)?.title || '') : ''}">
                    <textarea id="newsletterContent" rows="4" placeholder="Message / Content" class="w-full border rounded-lg p-2">${editingNewsletterId ? (currentNewslettersList.find(n => n.id === editingNewsletterId)?.content || '') : ''}</textarea>
                    <div class="flex gap-3">
                        <button id="saveNewsletterBtn" class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition"><i class="fas fa-save"></i> ${editingNewsletterId ? 'Update' : 'Publish'}</button>
                        ${editingNewsletterId ? `<button id="cancelEditBtn" class="bg-gray-400 text-white px-4 py-2 rounded-lg hover:bg-gray-500">Cancel</button>` : ''}
                    </div>
                </div>
            </div>
        `;
        let listHtml = `<div class="bg-white p-6 rounded-xl shadow"><h3 class="text-xl font-bold mb-4">📰 All Newsletters</h3><div class="space-y-4">`;
        if (currentNewslettersList.length === 0) {
            listHtml += `<p class="text-gray-500">No newsletters yet. Create one above.</p>`;
        } else {
            currentNewslettersList.forEach(n => {
                listHtml += `
                    <div class="border rounded-lg p-4 hover:shadow-md transition flex flex-wrap justify-between items-start gap-3">
                        <div class="flex-1">
                            <div class="flex items-center gap-2"><h4 class="font-bold text-lg">${escapeHtml(n.title)}</h4><span class="text-xs text-gray-400">${formatDate(n.created_at)}</span></div>
                            <p class="text-gray-600 mt-1">${escapeHtml(n.content).substring(0, 120)}${n.content.length > 120 ? '…' : ''}</p>
                        </div>
                        <div class="flex gap-2">
                            <button data-id="${n.id}" class="editNewsletterBtn bg-amber-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-amber-600"><i class="fas fa-edit"></i> Edit</button>
                            <button data-id="${n.id}" class="deleteNewsletterBtn bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                `;
            });
        }
        listHtml += `</div></div>`;
        main.innerHTML = addFormHtml + listHtml;

        // attach events
        document.getElementById('saveNewsletterBtn')?.addEventListener('click', async () => {
            const title = document.getElementById('newsletterTitle').value.trim();
            const content = document.getElementById('newsletterContent').value.trim();
            if (!title || !content) {
                showToast("Title and content are required", true);
                return;
            }
            try {
                if (editingNewsletterId) {
                    const { error } = await supabaseClient
                        .from('newsletters')
                        .update({ title, content, updated_at: new Date() })
                        .eq('id', editingNewsletterId);
                    if (error) throw error;
                    showToast("Newsletter updated!");
                } else {
                    const { error } = await supabaseClient
                        .from('newsletters')
                        .insert([{ title, content, created_at: new Date() }]);
                    if (error) throw error;
                    showToast("Newsletter published!");
                }
                editingNewsletterId = null;
                await loadAllNewslettersForManager();
                // instantly refresh landing page if visible
                fetchLatestNewsletter();
            } catch (err) {
                showToast("Error: " + err.message, true);
            }
        });
        if (document.getElementById('cancelEditBtn')) {
            document.getElementById('cancelEditBtn').addEventListener('click', () => {
                editingNewsletterId = null;
                loadAllNewslettersForManager();
            });
        }
        document.querySelectorAll('.editNewsletterBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                editingNewsletterId = btn.getAttribute('data-id');
                loadAllNewslettersForManager();
            });
        });
        document.querySelectorAll('.deleteNewsletterBtn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                if (confirm("Permanently delete this newsletter?")) {
                    try {
                        const { error } = await supabaseClient.from('newsletters').delete().eq('id', id);
                        if (error) throw error;
                        showToast("Deleted");
                        if (editingNewsletterId === id) editingNewsletterId = null;
                        await loadAllNewslettersForManager();
                        fetchLatestNewsletter();
                    } catch (err) {
                        showToast("Delete error: " + err.message, true);
                    }
                }
            });
        });
    }

    // inject newsletter manager link into sidebar for DG role (dg_ceo)
    function extendDashboardForDG() {
        if (!currentUser || currentUser.role !== 'dg_ceo') return;
        const navContainer = document.getElementById('dynamicNav');
        if (!navContainer) return;
        // avoid duplicate
        if (document.getElementById('newsletterManagerNavItem')) return;
        const managerLink = document.createElement('a');
        managerLink.id = 'newsletterManagerNavItem';
        managerLink.href = '#';
        managerLink.setAttribute('data-view', 'manage-newsletter');
        managerLink.className = 'nav-link flex items-center space-x-3 px-4 py-2.5 rounded-lg text-slate-200 hover:bg-white/10';
        managerLink.innerHTML = '<i class="fas fa-envelope-open-text w-5"></i><span>📰 Newsletter Manager</span>';
        managerLink.addEventListener('click', (e) => {
            e.preventDefault();
            loadAllNewslettersForManager();
            // update active state visually
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('bg-white/10', 'border-l-4', 'border-amber-400'));
            managerLink.classList.add('bg-white/10', 'border-l-4', 'border-amber-400');
            closeMobileSidebar();
        });
        navContainer.appendChild(managerLink);
    }

    // watch for login/logout to re‑inject manager (or re-render)
    function observeUserChanges() {
        const originalShowDashboard = window.showDashboard;
        if (originalShowDashboard) {
            window.showDashboard = function() {
                originalShowDashboard.apply(this, arguments);
                setTimeout(() => extendDashboardForDG(), 100);
            };
        }
        // also after any logout remove manager link
        const originalLogout = window.logoutUser;
        if (originalLogout) {
            window.logoutUser = async function() {
                if (newsletterSubscription) newsletterSubscription.unsubscribe();
                await originalLogout.apply(this, arguments);
                const mgrLink = document.getElementById('newsletterManagerNavItem');
                if (mgrLink) mgrLink.remove();
                // reinit landing newsletter (after logout landing visible)
                setTimeout(() => initLandingNewsletter(), 50);
            };
        }
    }

    // start everything after DOM ready
    window.addEventListener('DOMContentLoaded', () => {
        initLandingNewsletter();
        extendDashboardForDG();
        observeUserChanges();
        // re-check when user logs in (dashboard already overridden)
        if (window.currentUser && window.currentUser.role === 'dg_ceo') extendDashboardForDG();
    });
})();
</script>
